<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planogram 圖示</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <span class="hdr-logo"></span>
    <div>
      <div class="hdr-title">Planogram 圖示</div>
      <div class="hdr-sub">Apple Specialist Store · Three Table Shop</div>
    </div>
  </div>
  <a href="index.html" class="hdr-date" style="text-decoration:none">← 工具箱首頁</a>
</div>

<div class="main" id="mc"><div class="empty">載入中...</div></div>

<script type="module">
import { PAGE_DEFS, STORE_NAMES, checkPassword, loadStoreMeta, loadStorePages, uploadPlanogramPage, compressImage } from './shared/firebase-planogram.js';

let storeMeta = {};
let currentPages = {};
let currentStore = STORE_NAMES[0];
let unlocked = false;

async function init(){
  storeMeta = await loadStoreMeta();
  await loadCurrentStorePages();
  renderPlanogramTab();
}

async function loadCurrentStorePages(){
  currentPages = await loadStorePages(currentStore);
}

function getPages(){
  return PAGE_DEFS
    .filter(def => currentPages[String(def.page)])
    .map(def => ({ page: def.page, label: def.label, src: currentPages[String(def.page)] }));
}

function renderPlanogramTab(){
  const storeOptions = STORE_NAMES.map(name =>
    `<option value="${name}" ${name===currentStore?'selected':''}>${name}</option>`
  ).join('');
  const data = storeMeta[currentStore] || {};
  document.getElementById('mc').innerHTML = `
    <div class="sec-hdr">
      <div>
        <div class="sec-title">Planogram · 陳列圖示核對</div>
        <div class="sec-sub">Apple Shop 3.0${data.updateDate?' · 更新日期：'+data.updateDate:''} &nbsp;·&nbsp; 點擊標題展開／收合</div>
      </div>
    </div>
    <div class="plan-ctrl">
      <label for="store-select">門市：</label>
      <select id="store-select" onchange="window.switchStore(this.value)">${storeOptions}</select>
      <button class="btn-sm" onclick="window.expandAll()">全部展開</button>
      <button class="btn-sm" onclick="window.collapseAll()">全部收合</button>
      <button class="btn-sm" onclick="window.openUpload()">📤 上傳／更新圖示</button>
    </div>
    ${renderPlanogram()}
  `;
}

async function switchStore(name){
  currentStore = name;
  document.getElementById('mc').innerHTML = `<div class="empty">載入中...</div>`;
  await loadCurrentStorePages();
  renderPlanogramTab();
}

function renderPlanogram(){
  const pages = getPages();
  if(pages.length === 0){
    return `<div class="empty">此門市尚未上傳 Planogram 圖示</div>`;
  }
  const cards = pages.map(pg => `
    <div class="plan-card" id="pcard-${pg.page}">
      <div class="plan-hdr" onclick="window.togglePlan(${pg.page})">
        <span class="plan-label">${pg.label}</span>
        <span class="plan-toggle" id="ptog-${pg.page}">${pg.label.includes('門市整體配置總覽')?'▲':'▼'}</span>
      </div>
      <div class="plan-body" id="pbody-${pg.page}" style="${pg.label.includes('門市整體配置總覽')?'':'display:none'}">
        <img src="${pg.src}" class="plan-img" loading="lazy" alt="${pg.label}">
      </div>
    </div>
  `).join('');
  return cards;
}

function togglePlan(page){
  const body = document.getElementById('pbody-'+page);
  const tog  = document.getElementById('ptog-'+page);
  if(body.style.display === 'none'){
    body.style.display = 'block';
    tog.textContent = '▲';
  } else {
    body.style.display = 'none';
    tog.textContent = '▼';
  }
}

function expandAll(){ getPages().forEach(pg => { document.getElementById('pbody-'+pg.page).style.display='block'; document.getElementById('ptog-'+pg.page).textContent='▲'; }); }
function collapseAll(){ getPages().forEach(pg => { document.getElementById('pbody-'+pg.page).style.display='none'; document.getElementById('ptog-'+pg.page).textContent='▼'; }); }

function openUpload(){
  const overlay = document.createElement('div');
  overlay.className = 'upload-overlay';
  overlay.id = 'upload-overlay';
  overlay.innerHTML = `
    <div class="upload-modal">
      <div class="upload-modal-title">上傳／更新「${currentStore}」的 Planogram 圖示</div>
      ${!unlocked ? `
        <div class="upload-row">
          <label>共用密碼</label>
          <input type="password" id="upload-pw" placeholder="請輸入密碼">
        </div>
        <div class="upload-msg" id="upload-msg"></div>
        <div class="upload-actions">
          <button class="btn-sm" onclick="window.closeUpload()">取消</button>
          <button class="btn-sm" onclick="window.verifyPassword()">確認</button>
        </div>
      ` : renderUploadSlots()}
    </div>
  `;
  document.body.appendChild(overlay);
}

function renderUploadSlots(){
  const rows = PAGE_DEFS.map(def => `
    <div class="upload-slot">
      <span class="upload-slot-label">${def.label}${currentPages[String(def.page)] ? ' ✓' : ''}</span>
      <input type="file" accept="image/*" data-page="${def.page}" onchange="window.handleFileSelect(event)">
    </div>
  `).join('');
  return `
    <div class="upload-msg" id="upload-msg"></div>
    ${rows}
    <div class="upload-actions">
      <button class="btn-sm" onclick="window.closeUpload()">完成</button>
    </div>
  `;
}

function closeUpload(){
  unlocked = false;
  const el = document.getElementById('upload-overlay');
  if(el) el.remove();
}

function verifyPassword(){
  const pw = document.getElementById('upload-pw').value;
  if(checkPassword(pw)){
    unlocked = true;
    openUpload();
  } else {
    document.getElementById('upload-msg').textContent = '密碼錯誤，請重新輸入';
  }
}

async function handleFileSelect(evt){
  const file = evt.target.files[0];
  const pageNum = evt.target.getAttribute('data-page');
  if(!file) return;
  const msgEl = document.getElementById('upload-msg');
  msgEl.textContent = '壓縮並上傳中...';
  try {
    const compressed = await compressImage(file);
    await uploadPlanogramPage(currentStore, pageNum, compressed);
    storeMeta = await loadStoreMeta();
    await loadCurrentStorePages();
    msgEl.textContent = '✓ 上傳成功';
    openUpload();
    renderPlanogramTab();
  } catch(e){
    msgEl.textContent = '✗ 上傳失敗：' + e.message;
  }
}

window.switchStore = switchStore;
window.togglePlan = togglePlan;
window.expandAll = expandAll;
window.collapseAll = collapseAll;
window.openUpload = openUpload;
window.closeUpload = closeUpload;
window.verifyPassword = verifyPassword;
window.handleFileSelect = handleFileSelect;

init();
</script>
</body>
</html>
