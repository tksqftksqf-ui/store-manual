<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planogram 圖示</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <span class="hdr-logo"></span>
    <div>
      <div class="hdr-title">Planogram 圖示</div>
      <div class="hdr-sub">Apple Specialist Store · Three Table Shop</div>
    </div>
  </div>
  <a href="index.html" class="hdr-date" style="text-decoration:none">← 工具箱首頁</a>
</div>

<div class="main" id="mc"><div class="empty">載入中...</div></div>

<script type="module">
import { STORE_NAMES, checkPassword, loadStoreMeta, loadStorePages, uploadPlanogramPage, clearStorePages } from './shared/firebase-planogram.js';
import { extractPagesFromPdf, groupPagesByZone } from './shared/pdf-planogram.js';

let storeMeta = {};
let currentPages = [];
let currentStore = STORE_NAMES[0];
let unlocked = false;
let pendingZones = null; // PDF 解析後、送出前的待確認清單

async function init(){
  storeMeta = await loadStoreMeta();
  await loadCurrentStorePages();
  renderPlanogramTab();
}

async function loadCurrentStorePages(){
  currentPages = await loadStorePages(currentStore);
}

function renderPlanogramTab(){
  const storeOptions = STORE_NAMES.map(name =>
    `<option value="${name}" ${name===currentStore?'selected':''}>${name}</option>`
  ).join('');
  const data = storeMeta[currentStore] || {};
  document.getElementById('mc').innerHTML = `
    <div class="sec-hdr">
      <div>
        <div class="sec-title">Planogram · 陳列圖示核對</div>
        <div class="sec-sub">Apple Shop 3.0${data.updateDate?' · 更新日期：'+data.updateDate:''} &nbsp;·&nbsp; 點擊標題展開／收合</div>
      </div>
    </div>
    <div class="plan-ctrl">
      <label for="store-select">門市：</label>
      <select id="store-select" onchange="window.switchStore(this.value)">${storeOptions}</select>
      <button class="btn-sm" onclick="window.expandAll()">全部展開</button>
      <button class="btn-sm" onclick="window.collapseAll()">全部收合</button>
      <button class="btn-sm" onclick="window.openUpload()">📤 上傳 Planogram PDF</button>
    </div>
    ${renderPlanogram()}
  `;
}

async function switchStore(name){
  currentStore = name;
  document.getElementById('mc').innerHTML = `<div class="empty">載入中...</div>`;
  await loadCurrentStorePages();
  renderPlanogramTab();
}

function renderPlanogram(){
  if(currentPages.length === 0){
    return `<div class="empty">此門市尚未上傳 Planogram 圖示</div>`;
  }
  const cards = currentPages.map((pg, idx) => `
    <div class="plan-card" id="pcard-${idx}">
      <div class="plan-hdr" onclick="window.togglePlan(${idx})">
        <span class="plan-label">${pg.label}</span>
        <span class="plan-toggle" id="ptog-${idx}">${idx===0?'▲':'▼'}</span>
      </div>
      <div class="plan-body" id="pbody-${idx}" style="${idx===0?'':'display:none'}">
        <img src="${pg.src}" class="plan-img" loading="lazy" alt="${pg.label}">
      </div>
    </div>
  `).join('');
  return cards;
}

function togglePlan(idx){
  const body = document.getElementById('pbody-'+idx);
  const tog  = document.getElementById('ptog-'+idx);
  if(body.style.display === 'none'){
    body.style.display = 'block';
    tog.textContent = '▲';
  } else {
    body.style.display = 'none';
    tog.textContent = '▼';
  }
}

function expandAll(){ currentPages.forEach((pg,idx) => { document.getElementById('pbody-'+idx).style.display='block'; document.getElementById('ptog-'+idx).textContent='▲'; }); }
function collapseAll(){ currentPages.forEach((pg,idx) => { document.getElementById('pbody-'+idx).style.display='none'; document.getElementById('ptog-'+idx).textContent='▼'; }); }

function openUpload(){
  const existing = document.getElementById('upload-overlay');
  if(existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'upload-overlay';
  overlay.id = 'upload-overlay';
  overlay.innerHTML = `
    <div class="upload-modal">
      <div class="upload-modal-title">上傳「${currentStore}」的 Planogram PDF</div>
      ${!unlocked ? `
        <div class="upload-row">
          <label>共用密碼</label>
          <input type="password" id="upload-pw" placeholder="請輸入密碼">
        </div>
        <div class="upload-msg" id="upload-msg"></div>
        <div class="upload-actions">
          <button class="btn-sm" onclick="window.closeUpload()">取消</button>
          <button class="btn-sm" onclick="window.verifyPassword()">確認</button>
        </div>
      ` : renderPdfPicker()}
    </div>
  `;
  document.body.appendChild(overlay);
}

function renderPdfPicker(){
  return `
    <div class="upload-msg" id="upload-msg">請選擇完整的 Planogram PDF 檔案，系統會自動辨識每頁對應的櫃位。</div>
    <input type="file" accept="application/pdf" onchange="window.handlePdfSelect(event)">
    <div id="upload-zone-list"></div>
    <div class="upload-actions">
      <button class="btn-sm" onclick="window.closeUpload()">取消</button>
    </div>
  `;
}

function closeUpload(){
  unlocked = false;
  pendingZones = null;
  const el = document.getElementById('upload-overlay');
  if(el) el.remove();
}

function verifyPassword(){
  const pw = document.getElementById('upload-pw').value;
  if(checkPassword(pw)){
    unlocked = true;
    openUpload();
  } else {
    document.getElementById('upload-msg').textContent = '密碼錯誤，請重新輸入';
  }
}

async function handlePdfSelect(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const msgEl = document.getElementById('upload-msg');
  msgEl.textContent = '正在解析 PDF，請稍候（頁數較多時可能需要 10~30 秒）...';
  document.getElementById('upload-zone-list').innerHTML = '';
  try {
    const pages = await extractPagesFromPdf(file);
    const zones = groupPagesByZone(pages);
    if(zones.length === 0){
      msgEl.textContent = '✗ 沒有偵測到任何陳列圖頁面，請確認 PDF 內容是否正確。';
      return;
    }
    pendingZones = zones.map(z => ({ ...z, zoneName: z.zoneName, skip: false }));
    msgEl.textContent = `偵測到 ${zones.length} 個陳列頁面，請確認櫃位名稱是否正確（可直接修改文字）：`;
    renderZoneConfirmList();
  } catch(e){
    msgEl.textContent = '✗ PDF 解析失敗：' + e.message;
  }
}

function renderZoneConfirmList(){
  const rows = pendingZones.map((z, idx) => `
    <div class="upload-slot">
      <img src="${z.imageDataUrl}" class="upload-thumb" alt="第${z.pageNum}頁預覽">
      <input type="text" class="upload-zone-input" id="zone-name-${idx}" value="${z.zoneName.replace(/"/g,'&quot;')}" ${z.skip?'disabled':''}>
      <label class="upload-skip-label">
        <input type="checkbox" ${z.skip?'checked':''} onchange="window.toggleSkip(${idx}, this.checked)">
        略過此頁
      </label>
    </div>
  `).join('');
  document.getElementById('upload-zone-list').innerHTML = `
    <div class="upload-msg" style="color:#c0392b">⚠️ 確認上傳後會清空「${currentStore}」目前所有的 Planogram 圖示，以這次上傳的內容為準。</div>
    ${rows}
    <div class="upload-actions">
      <button class="btn-sm" onclick="window.closeUpload()">取消</button>
      <button class="btn-sm" onclick="window.submitZones()">確認上傳</button>
    </div>
  `;
}

function toggleSkip(idx, checked){
  pendingZones[idx].skip = checked;
  document.getElementById('zone-name-'+idx).disabled = checked;
}

async function submitZones(){
  const msgEl = document.getElementById('upload-msg');
  const toUpload = pendingZones
    .filter(z => !z.skip)
    .map((z, i) => ({ ...z, zoneName: document.getElementById('zone-name-'+pendingZones.indexOf(z)).value.trim() }))
    .filter(z => z.zoneName);
  if(toUpload.length === 0){
    msgEl.textContent = '沒有可上傳的頁面（全部已略過或名稱為空）。';
    return;
  }
  msgEl.textContent = `清除舊資料中...`;
  document.getElementById('upload-zone-list').innerHTML = '';
  try {
    await clearStorePages(currentStore);
    for(let i = 0; i < toUpload.length; i++){
      await uploadPlanogramPage(currentStore, toUpload[i].zoneName, toUpload[i].imageDataUrl);
      msgEl.textContent = `上傳中 ${i+1}/${toUpload.length}...`;
    }
    storeMeta = await loadStoreMeta();
    await loadCurrentStorePages();
    msgEl.textContent = `✓ 上傳成功，共 ${toUpload.length} 個櫃位。`;
    pendingZones = null;
    renderPlanogramTab();
  } catch(e){
    msgEl.textContent = '✗ 上傳失敗：' + e.message;
  }
}

window.switchStore = switchStore;
window.togglePlan = togglePlan;
window.expandAll = expandAll;
window.collapseAll = collapseAll;
window.openUpload = openUpload;
window.closeUpload = closeUpload;
window.verifyPassword = verifyPassword;
window.handlePdfSelect = handlePdfSelect;
window.toggleSkip = toggleSkip;
window.submitZones = submitZones;

init();
</script>
</body>
</html>
