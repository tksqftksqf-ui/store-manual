function updateSearchResults(){
  const filtered = PRODUCTS.filter(p => {
    const matchCat = searchCat === 'all' || p.cat === searchCat;
    if(!matchCat) return false;
    if(!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return [p.name,p.spec,p.color,p.pid,p.mpn,String(p.price)].some(v=>v.toLowerCase().includes(q));
  });

  document.querySelectorAll('.cat-btn').forEach(btn => {
    const c = btn.dataset.cat;
    const on = c === searchCat;
    btn.style.borderColor = on ? 'var(--blue)' : 'var(--border)';
    btn.style.background  = on ? 'var(--blue)' : 'var(--white)';
    btn.style.color       = on ? '#fff' : 'var(--gray)';
  });

  const el = document.getElementById('search-results');
  if(!el) return;

  if(filtered.length === 0){
    el.innerHTML = `<div style="padding:12px 16px;background:var(--light);border-bottom:1px solid var(--border);font-size:12px;color:var(--gray);font-weight:600">找到 <span style="color:var(--text)">0</span> 筆結果</div><div class="empty">找不到符合的商品</div>`;
    return;
  }

  const catCls = c => c==='Mac'?'badge-blue':c==='iPad'?'badge-orange':c==='iPhone'?'badge-green':'badge-gray';
  let rows = '';
  let prevName = null, prevSpec = null, specToggle = 0;

  for(const p of filtered){
    if(p.name !== prevName){
      prevName = p.name;
      prevSpec = null;
      specToggle = 0;
      rows += `<tr class="search-group-row" style="background:#eef1f5;border-top:2px solid #c8d4e0;border-bottom:1px solid #c8d4e0">
        <td colspan="8" style="padding:8px 14px;font-size:13px;font-weight:700">
          <span class="badge ${catCls(p.cat)}" style="margin-right:8px">${p.cat}</span>${p.name}
        </td>
      </tr>`;
    }
    if(p.spec !== prevSpec){
      prevSpec = p.spec;
      specToggle ^= 1;
    }
    const bg = specToggle ? '#f4f7fb' : 'var(--white)';
    const edu = EDU_DISCOUNT[p.pid];
    const act = ACTIVITY_PROMO[p.pid];
    const actStyle = act?.d ? 'color:var(--green)' : act?.m==='暫無交期' ? 'color:var(--red)' : act?.m ? 'color:var(--orange)' : 'color:var(--border)';
    const actVal = act?.d ? '-$'+act.d.toLocaleString() : act?.m || '—';
    const promo = act?.d ? p.price - act.d : null;
    rows += `<tr class="search-row" style="border-bottom:1px solid var(--border);background:${bg}" onmouseover="this.style.background='var(--blue-bg)'" onmouseout="this.style.background='${bg}'">
      <td data-label="貨號" style="padding:10px 8px;font-family:ui-monospace,monospace;font-weight:700;color:var(--blue);font-size:16px;white-space:nowrap">${p.pid}</td>
      <td data-label="顏色" style="padding:10px 8px;white-space:nowrap">${p.color||'—'}</td>
      <td data-label="規格" style="padding:10px 8px;white-space:nowrap;color:var(--gray);font-size:13px">${p.spec}</td>
      <td data-label="售價" style="padding:10px 8px;text-align:left;font-weight:600;white-space:nowrap">$${p.price.toLocaleString()}</td>
      <td data-label="活動折扣" style="padding:10px 4px 10px 8px;text-align:left;font-weight:700;width:90px;max-width:90px;white-space:normal;${actStyle}">${actVal}</td>
      <td data-label="促銷價(未含教育折扣)" style="padding:10px 8px 10px 4px;text-align:left;white-space:nowrap">${promo!=null?`<span style="display:inline-block;padding:3px 9px;border-radius:6px;background:var(--green-bg);color:var(--green);font-weight:700;font-size:14px">$${promo.toLocaleString()}</span>`:'<span style="color:var(--border)">—</span>'}</td>
      <td data-label="贈品" style="padding:10px 8px;font-size:13px;color:var(--text)">${act?.g||'—'}</td>
      <td data-label="教育折抵" style="padding:10px 8px;text-align:left;font-weight:700;white-space:nowrap;${edu?'color:var(--red)':'color:var(--border)'}">${edu?'-$'+edu.toLocaleString():'—'}</td>
    </tr>`;
  }

  el.innerHTML = `
    <div style="padding:12px 16px;background:var(--light);border-bottom:1px solid var(--border);font-size:12px;color:var(--gray);font-weight:600">找到 <span style="color:var(--text)">${filtered.length}</span> 筆結果</div>
    <div style="overflow-x:auto">
      <table class="search-table" style="width:auto;min-width:100%;border-collapse:collapse;font-size:15px">
        <thead>
          <tr style="background:var(--light);border-bottom:1px solid var(--border)">
            <th class="search-thead-th" style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">貨號</th>
            <th class="search-thead-th" style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">顏色</th>
            <th class="search-thead-th" style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px">規格</th>
            <th class="search-thead-th" style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">售價</th>
            <th class="search-thead-th" style="padding:10px 4px 10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;width:90px;max-width:90px">活動折扣</th>
            <th class="search-thead-th" style="padding:10px 8px 10px 4px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">促銷價<br><span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--gray)">未含教育折扣</span></th>
            <th class="search-thead-th" style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">贈品</th>
            <th class="search-thead-th" style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">教育折抵</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

          oninput="searchQuery=this.value;updateSearchResults()" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
        <button onclick="searchQuery='';document.getElementById('sq').value='';updateSearchResults()" style="padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);font-size:13px;cursor:pointer;font-family:inherit;color:var(--gray)">清除</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${cats.map(c=>`<button class="cat-btn" data-cat="${c}" onclick="searchCat='${c}';updateSearchResults()" style="padding:5px 14px;border-radius:20px;border:1.5px solid ${searchCat===c?'var(--blue)':'var(--border)'};background:${searchCat===c?'var(--blue)':'var(--white)'};color:${searchCat===c?'#fff':'var(--gray)'};font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .13s">${catLabels[c]}</button>`).join('')}
      </div>
    </div>
    <div id="search-results" class="card" style="padding:0;overflow:hidden"></div>`;

  updateSearchResults();
}

renderSearch();
</script>
</body>
</html>
