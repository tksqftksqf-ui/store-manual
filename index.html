<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>燦坤新光華 · 門市工具箱</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body>

<div class="hdr">

  </div>
  <span class="hdr-date" id="today-date"></span>
</div>

<div class="main">
  <div class="entry-grid">
    <a class="entry-card" href="search.html">
      <div class="entry-icon">🔍</div>
      <div class="entry-title">貨號查詢</div>
      <div class="entry-desc">貨號、售價、教育折抵、活動折扣、贈品查詢</div>

    <a class="entry-card" href="bts.html">

    <a class="entry-card" href="activity.html">

    <a class="entry-card" href="https://price-tag-crop.vercel.app" target="_blank" rel="noopener">

      <div class="entry-title">價格牌裁切工具</div>
      <div class="entry-desc">價格標籤圖片裁切工具</div>

      <div class="entry-title">Planogram 圖示</div>
      <div class="entry-desc">門市桌台陳列平面圖核對</div>

    <a class="entry-card" href="security.html">
      <div class="entry-icon">🔒</div>
      <div class="entry-title">展示機規範</div>
      <div class="entry-desc">展示機管理規則與陳列規範圖示</div>
    </a>

<script>
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric'});
</script>
