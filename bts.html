function fmt(n){ return '$'+n.toLocaleString(); }

function toggleGroup(key){
  if(btsOpen.has(key)) btsOpen.delete(key); else btsOpen.add(key);
  updateBTSResults();
}

function updateBTSResults(){
  const q = btsQuery.trim().toLowerCase();
  const el = document.getElementById('bts-results');
  if(!el) return;

  const groupsToShow = BTS_GROUPS.map(g => {
    const products = q
      ? g.products.filter(p => [p.pid, p.color, p.spec, g.name].some(v => String(v).toLowerCase().includes(q)))
      : g.products;
    return {...g, products};
  }).filter(g => g.products.length > 0);

  if(q && groupsToShow.length){
    groupsToShow.forEach(g => btsOpen.add(g.key));
  }

  if(groupsToShow.length === 0){
    el.innerHTML = `<div class="empty">找不到符合的商品</div>`;
    return;
  }

  el.innerHTML = groupsToShow.map(g => {
    const open = btsOpen.has(g.key);
    const rows = g.products.map(p => `
      <tr class="search-row">
        <td data-label="貨號" style="padding:10px 8px;font-family:ui-monospace,monospace;font-weight:700;color:var(--blue);font-size:15px;white-space:nowrap">${p.pid}</td>
        <td data-label="顏色" style="padding:10px 8px;white-space:nowrap">${p.color}</td>
        <td data-label="規格" style="padding:10px 8px;color:var(--gray);font-size:13px;white-space:nowrap">${p.spec}</td>
        <td data-label="售價" style="padding:10px 8px;text-align:right;white-space:nowrap">${fmt(p.price)}</td>
        <td data-label="教育折抵" style="padding:10px 8px;text-align:right;color:var(--green);font-weight:700;white-space:nowrap">-${fmt(p.edu)}</td>
        <td data-label="促銷價" style="padding:10px 8px;text-align:right;font-weight:700;white-space:nowrap">${fmt(p.price)}</td>
        <td data-label="贈品" style="padding:10px 8px;font-size:12px;color:#b45309">🎁 買就送市價${g.giftBanner.toLocaleString()}好禮（明細見上方）</td>
      </tr>`).join('');
    return `
    <div class="bts-card" data-jump="${g.key}">
      <div class="bts-hdr-top">
        <div class="bts-hdr-left">
          <span class="bts-name">${g.name}</span>
          <span class="bts-gift-banner">🎁 買就送市價${g.giftBanner.toLocaleString()}好禮</span>
          <span class="bts-count">共 ${g.products.length} 項</span>
        </div>
      </div>
      <div class="bts-gift-box"><b>贈品明細：</b>${g.giftText}</div>
      <div class="bts-toggle-bar" onclick="toggleGroup('${g.key}')">
        <span class="bts-toggle">${open ? '收合貨號 ▲' : '查看貨號、售價、教育折抵、促銷價 ▼'}</span>
      </div>
      <div class="bts-body ${open ? 'open' : ''}">
        <div class="search-table-wrap" style="overflow-x:auto">
          <table class="search-table" style="width:auto;min-width:100%;border-collapse:collapse;font-size:14px">
            <thead>
              <tr style="background:var(--light);border-bottom:1px solid var(--border)">
                <th style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">貨號</th>
                <th style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">顏色</th>
                <th style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">規格</th>
                <th style="padding:10px 8px;text-align:right;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">售價</th>
                <th style="padding:10px 8px;text-align:right;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">教育折抵</th>
                <th style="padding:10px 8px;text-align:right;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">促銷價</th>
                <th style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px">贈品</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderBTS(){
  document.getElementById('mc').innerHTML = `
    <div class="sec-hdr"><div>
      <div class="sec-title">BTS開學季優惠 <span style="font-size:15px;font-weight:700;color:var(--orange);background:var(--orange-bg);padding:2px 10px;border-radius:8px;margin-left:8px">0717–0731</span></div>
      <div class="sec-sub">共 8 個系列 · 買機送好禮，教育折抵可疊加，贈品可換ACPP或JC</div>
    </div></div>
    <div class="card" style="padding:16px 20px">
      <input id="bts-search" type="text" placeholder="搜尋關鍵字…（如 MacBook Air、267371、太空黑）"
        style="width:100%;max-width:480px;padding:.45em .8em;border:1px solid var(--border);border-radius:6px;font-size:.95em;box-sizing:border-box;outline:none"
        value="${btsQuery}"
        oninput="btsQuery=this.value;updateBTSResults()">
      <div style="margin-top:.6em;display:flex;flex-wrap:wrap;gap:.4em">
        ${BTS_GROUPS.map(g=>`<button
          onclick="document.getElementById('bts-search').value='';btsQuery='';BTS_GROUPS.forEach(x=>btsOpen.delete(x.key));btsOpen.add('${g.key}');updateBTSResults();document.querySelector('[data-jump=\\'${g.key}\\']')?.scrollIntoView({behavior:'smooth'})"
          style="padding:.3em .75em;font-size:.8em;border:1px solid var(--border);border-radius:20px;background:var(--white);color:var(--gray);cursor:pointer;white-space:nowrap">
          ${g.name}
        </button>`).join('')}
      </div>
    </div>
    <div id="bts-results"></div>`;
  updateBTSResults();
}

renderBTS();
</script>
</body>
</html>
