          ${c==='all'?'全部類別':c}
        </button>`).join('')}
      </div>
    </div>
    <div id="arrival-results"></div>`;

function updateArrivalResults(){
  const filtered = ARRIVALS.filter(a => {
    if(arrivalCat !== 'all' && a.cat !== arrivalCat) return false;
    if(!arrivalQuery) return true;
    const q = arrivalQuery.toLowerCase();
    const prod = PRODUCTS.find(x => x.pid === a.pid);
    const name = prod ? `${prod.name} ${prod.color||''} ${prod.spec||''}` : a.name;
    return [a.pid, a.mpn, name, a.cat].some(v => v.toLowerCase().includes(q));
  });

  const el = document.getElementById('arrival-results');
  if(!el) return;

  if(filtered.length === 0){
    el.innerHTML = `<div style="padding:12px 16px;background:var(--light);border-bottom:1px solid var(--border);font-size:12px;color:var(--gray);font-weight:600">找到 <span style="color:var(--text)">0</span> 筆結果</div><div class="empty">找不到符合的商品</div>`;
    return;
  }

  const catCls = c => c==='Mac'?'badge-blue':c==='iPad'?'badge-orange':c==='iPhone'?'badge-green':'badge-gray';
  function qtyCell(n, label){
    if(!n) return `<td data-label="${label}" style="padding:10px 14px;text-align:center;color:var(--border)">—</td>`;
    const s = n>=50?'color:var(--green);font-weight:800':n>=10?'color:var(--green);font-weight:700':'color:var(--orange);font-weight:700';
    return `<td data-label="${label}" style="padding:10px 14px;text-align:center;font-size:15px;${s}">${n.toLocaleString()}</td>`;
  }

  let rows = '';
  let prevGroup = null;
  for(const a of filtered){
    const prod = PRODUCTS.find(x => x.pid === a.pid);
    const groupName = prod ? prod.name : a.name;
    const detail = prod
      ? [prod.color, prod.spec].filter(Boolean).join(' · ')
      : a.mpn;
    if(groupName !== prevGroup){
      prevGroup = groupName;
      rows += `<tr class="search-group-row" style="background:#eef1f5;border-top:2px solid #c8d4e0;border-bottom:1px solid #c8d4e0">
        <td colspan="4" style="padding:8px 14px;font-size:13px;font-weight:700">
          <span class="badge ${catCls(a.cat)}" style="margin-right:8px">${a.cat}</span>${groupName}
        </td>
      </tr>`;
    }
    rows += `<tr class="search-row" style="border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--blue-bg)'" onmouseout="this.style.background=''">
      <td data-label="貨號" style="padding:10px 8px;font-family:ui-monospace,monospace;font-weight:700;color:var(--blue);font-size:16px;white-space:nowrap">${a.pid}</td>
      <td data-label="顏色 / 規格" style="padding:10px 8px;color:var(--gray);font-size:13px;white-space:nowrap">${detail}</td>
      ${qtyCell(a.qty[0], ARRIVAL_WEEKS[0])}
      ${qtyCell(a.qty[1], ARRIVAL_WEEKS[1])}
    </tr>`;
  }

  el.innerHTML = `
    <div style="padding:12px 16px;background:var(--light);border-bottom:1px solid var(--border);font-size:12px;color:var(--gray);font-weight:600">找到 <span style="color:var(--text)">${filtered.length}</span> 筆結果</div>
    <div class="search-table-wrap" style="overflow-x:auto">
      <table class="search-table" style="width:auto;min-width:100%;border-collapse:collapse;font-size:15px">
        <thead>
          <tr style="background:var(--light);border-bottom:1px solid var(--border)">
            <th style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">貨號</th>
            <th style="padding:10px 8px;text-align:left;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px">顏色 / 規格</th>
            <th style="padding:10px 14px;text-align:center;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">${ARRIVAL_WEEKS[0]}</th>
            <th style="padding:10px 14px;text-align:center;font-weight:700;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">${ARRIVAL_WEEKS[1]}</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}


renderArrivals();
</script>
