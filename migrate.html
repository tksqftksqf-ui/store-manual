<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>一次性資料遷移</title>
</head>
<body style="font-family:-apple-system,sans-serif;padding:40px;max-width:600px;margin:0 auto">
<h2>Planogram 新光華資料遷移到 Firestore</h2>
<p id="status">準備中...</p>
<button id="btn" onclick="runMigrate()" disabled>開始遷移</button>

<script type="module">
import { migrateStoreData } from './shared/firebase-planogram.js';
window.runMigrate = async function(){
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('btn');
  btn.disabled = true;
  statusEl.textContent = '上傳中，請稍候（資料約 2.6MB）...';
  try {
    const data = window.MIGRATE_NIKKO;
    const pages = {};
    Object.keys(data.pages).forEach(k => { pages[k] = data.pages[k].src; });
    await migrateStoreData('新光華', data.updateDate, pages);
    statusEl.textContent = '✓ 遷移成功！新光華 7 張圖已寫入 Firestore。這個頁面（migrate.html）跟 migrate-data.js 現在可以刪除了。';
  } catch (e) {
    statusEl.textContent = '✗ 失敗：' + e.message;
    btn.disabled = false;
  }
};
document.getElementById('status').textContent = '已載入，可以開始遷移。';
document.getElementById('btn').disabled = false;
</script>
<script src="migrate-data.js"></script>
</body>
</html>
